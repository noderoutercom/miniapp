<!-- screens/form/view.html — Item Master create/edit tabbed form -->
<div class="im-form-screen">

  <!-- Header bar -->
  <div class="im-form-header d-flex justify-content-between align-items-center mb-3">
    <div class="d-flex align-items-center gap-2">
      <button class="btn btn-sm btn-outline-secondary" id="im-btn-back">&#8592; Back to List</button>
      <h6 class="mb-0" id="im-form-title">New Item Setup</h6>
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-sm btn-success" id="im-btn-save">Save</button>
      <button class="btn btn-sm btn-secondary" id="im-btn-cancel">Cancel</button>
    </div>
  </div>

  <!-- Hidden state -->
  <input type="hidden" id="im-f-id" />
  <input type="hidden" id="im-f-version" />

  <!-- Tabs -->
  <ul class="nav nav-tabs mb-3" id="im-tabs">
    <li class="nav-item">
      <button class="nav-link active" data-tab="general">General Info</button>
    </li>
    <li class="nav-item">
      <button class="nav-link" data-tab="planning">Logistics &amp; Planning</button>
    </li>
    <li class="nav-item">
      <button class="nav-link" data-tab="costing">Costing &amp; Financials</button>
    </li>
  </ul>

  <!-- Tab: General Info -->
  <div id="im-tab-general" class="im-tab-pane">
    <div class="row g-3">
      <div class="col-md-3">
        <label class="form-label form-label-sm">Item Code <span class="text-danger">*</span></label>
        <input id="im-f-code" type="text" class="form-control form-control-sm"
               placeholder="e.g. MAT-STEEL-001" maxlength="50" />
        <div class="im-field-hint">Uppercase, hyphens/underscores only. Max 50 chars.</div>
        <div class="invalid-feedback" id="im-code-err"></div>
      </div>
      <div class="col-md-5">
        <label class="form-label form-label-sm">Item Name <span class="text-danger">*</span></label>
        <input id="im-f-name" type="text" class="form-control form-control-sm"
               placeholder="Descriptive item name" maxlength="255" />
      </div>
      <div class="col-md-2">
        <label class="form-label form-label-sm">Item Type <span class="text-danger">*</span></label>
        <select id="im-f-type" class="form-select form-select-sm">
          <option value="">— Select —</option>
          <option value="RAW_MATERIAL">Raw Material</option>
          <option value="WORK_IN_PROGRESS">Work in Progress</option>
          <option value="FINISHED_GOOD">Finished Good</option>
          <option value="PACKAGING">Packaging</option>
          <option value="CONSUMABLE">Consumable</option>
        </select>
      </div>
      <div class="col-md-2">
        <label class="form-label form-label-sm">Category <span class="text-danger">*</span></label>
        <select id="im-f-category" class="form-select form-select-sm">
          <option value="">— Select —</option>
        </select>
      </div>
      <div class="col-md-2">
        <label class="form-label form-label-sm">Base UOM <span class="text-danger">*</span></label>
        <select id="im-f-uom" class="form-select form-select-sm">
          <option value="">— Select —</option>
        </select>
      </div>
      <div class="col-md-10">
        <label class="form-label form-label-sm">Description</label>
        <textarea id="im-f-desc" class="form-control form-control-sm" rows="3"
                  placeholder="Detailed technical description…"></textarea>
      </div>
    </div>

    <div class="mt-3">
      <label class="form-label form-label-sm d-block mb-1">Inventory Controls</label>
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="im-f-lot" />
        <label class="form-check-label" for="im-f-lot">
          Enable Lot / Batch Tracking <span class="text-muted">(required for raw material traceability)</span>
        </label>
      </div>
    </div>
  </div>

  <!-- Tab: Logistics & Planning -->
  <div id="im-tab-planning" class="im-tab-pane d-none">
    <div class="row g-3">
      <div class="col-md-3">
        <label class="form-label form-label-sm">Safety Stock</label>
        <input id="im-f-safety-stock" type="number" min="0" step="0.0001"
               class="form-control form-control-sm" value="0" />
      </div>
      <div class="col-md-3">
        <label class="form-label form-label-sm">Reorder Point</label>
        <input id="im-f-reorder-point" type="number" min="0" step="0.0001"
               class="form-control form-control-sm" value="0" />
      </div>
      <div class="col-md-3">
        <label class="form-label form-label-sm">Lead Time (days)</label>
        <input id="im-f-lead-time" type="number" min="0" step="1"
               class="form-control form-control-sm" value="0" />
      </div>
      <div class="col-md-3">
        <label class="form-label form-label-sm">Min Order Qty</label>
        <input id="im-f-min-order" type="number" min="0" step="0.0001"
               class="form-control form-control-sm" value="1" />
      </div>
    </div>
  </div>

  <!-- Tab: Costing & Financials -->
  <div id="im-tab-costing" class="im-tab-pane d-none">
    <div class="row g-3">
      <div class="col-md-3">
        <label class="form-label form-label-sm">Costing Method</label>
        <select id="im-f-costing-method" class="form-select form-select-sm">
          <option value="STANDARD">Standard</option>
          <option value="MOVING_AVERAGE">Moving Average</option>
          <option value="FIFO">FIFO</option>
          <option value="LIFO">LIFO</option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label form-label-sm">Standard Cost</label>
        <input id="im-f-standard-cost" type="number" min="0" step="0.0001"
               class="form-control form-control-sm" value="0" />
      </div>
      <div class="col-md-3">
        <label class="form-label form-label-sm">Moving Avg Cost</label>
        <input id="im-f-avg-cost" type="number" min="0" step="0.0001"
               class="form-control form-control-sm" value="0" />
      </div>
      <div class="col-md-3">
        <label class="form-label form-label-sm">Currency</label>
        <select id="im-f-currency" class="form-select form-select-sm">
          <option value="USD">USD</option>
          <option value="EUR">EUR</option>
          <option value="GBP">GBP</option>
          <option value="SGD">SGD</option>
          <option value="JPY">JPY</option>
          <option value="THB">THB</option>
        </select>
      </div>
    </div>
  </div>

</div>
