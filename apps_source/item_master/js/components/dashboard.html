<!-- screens/dashboard/view.html — Item Master list workspace -->
<div class="im-dashboard">

  <!-- Toolbar -->
  <div class="im-toolbar d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0">Item Master</h5>
    <button class="btn btn-sm btn-primary" id="im-btn-new">+ New Item</button>
  </div>

  <!-- Filter panel -->
  <div class="im-filter-panel card mb-3">
    <div class="card-body py-2">
      <div class="row g-2 align-items-end">
        <div class="col-md-4">
          <input id="im-filter-search" type="text" class="form-control form-control-sm"
                 placeholder="Search code or name…" />
        </div>
        <div class="col-md-2">
          <select id="im-filter-type" class="form-select form-select-sm">
            <option value="">All Types</option>
            <option value="RAW_MATERIAL">Raw Material</option>
            <option value="WORK_IN_PROGRESS">Work in Progress</option>
            <option value="FINISHED_GOOD">Finished Good</option>
            <option value="PACKAGING">Packaging</option>
            <option value="CONSUMABLE">Consumable</option>
          </select>
        </div>
        <div class="col-md-2">
          <select id="im-filter-status" class="form-select form-select-sm">
            <option value="">All Statuses</option>
            <option value="DRAFT">Draft</option>
            <option value="ACTIVE">Active</option>
            <option value="PHASE_OUT">Phase Out</option>
            <option value="OBSOLETE">Obsolete</option>
          </select>
        </div>
        <div class="col-md-2">
          <select id="im-filter-category" class="form-select form-select-sm">
            <option value="">All Categories</option>
          </select>
        </div>
        <div class="col-md-2 d-flex gap-2">
          <button class="btn btn-sm btn-primary flex-fill" id="im-btn-search">Search</button>
          <button class="btn btn-sm btn-outline-secondary" id="im-btn-refresh" title="Refresh">&#8635;</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Data grid -->
  <div class="table-responsive">
    <table class="table table-sm table-hover im-table">
      <thead class="table-light">
        <tr>
          <th>Item Code</th>
          <th>Name</th>
          <th>Type</th>
          <th>Category</th>
          <th>UOM</th>
          <th>Lot</th>
          <th>Status</th>
          <th>Created</th>
          <th style="width:140px">Actions</th>
        </tr>
      </thead>
      <tbody id="im-tbody"></tbody>
    </table>
  </div>

  <div id="im-empty" class="text-muted text-center py-4 d-none">No items found.</div>
  <div id="im-loading" class="text-center py-3 d-none">
    <span class="spinner-border spinner-border-sm me-1"></span> Loading…
  </div>

  <!-- Pagination -->
  <div class="d-flex justify-content-between align-items-center mt-2" id="im-pagination-bar">
    <small class="text-muted" id="im-page-info"></small>
    <div class="d-flex gap-1">
      <button class="btn btn-sm btn-outline-secondary" id="im-btn-prev">‹ Prev</button>
      <button class="btn btn-sm btn-outline-secondary" id="im-btn-next">Next ›</button>
    </div>
  </div>

  <!-- Status-change modal -->
  <div class="modal fade" id="im-status-modal" tabindex="-1">
    <div class="modal-dialog modal-sm">
      <div class="modal-content">
        <div class="modal-header py-2">
          <h6 class="modal-title">Change Status</h6>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <select id="im-modal-status" class="form-select form-select-sm mb-2">
            <option value="DRAFT">Draft</option>
            <option value="ACTIVE">Active</option>
            <option value="PHASE_OUT">Phase Out</option>
            <option value="OBSOLETE">Obsolete</option>
          </select>
          <input type="hidden" id="im-modal-item-id" />
        </div>
        <div class="modal-footer py-2">
          <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-sm btn-primary" id="im-modal-btn-apply">Apply</button>
        </div>
      </div>
    </div>
  </div>

</div>
