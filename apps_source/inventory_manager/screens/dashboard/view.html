<!-- screens/dashboard/view.html -->
<div class="inv-dashboard">
  <div class="inv-toolbar d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0">Inventory Items</h5>
    <button class="btn btn-sm btn-primary" id="inv-btn-add">+ Add Item</button>
  </div>

  <!-- Add Item Form (hidden by default) -->
  <div id="inv-form-wrap" class="card mb-3 d-none">
    <div class="card-body">
      <h6 class="card-title">New Item</h6>
      <div class="row g-2">
        <div class="col-md-4">
          <input id="inv-f-code"     type="text"   class="form-control form-control-sm" placeholder="Item Code" />
        </div>
        <div class="col-md-3">
          <input id="inv-f-qty"      type="number" class="form-control form-control-sm" placeholder="Quantity" min="0" />
        </div>
        <div class="col-md-3">
          <select id="inv-f-status" class="form-select form-select-sm">
            <option value="active">active</option>
            <option value="inactive">inactive</option>
            <option value="archived">archived</option>
          </select>
        </div>
        <div class="col-md-2 d-flex gap-1">
          <button class="btn btn-sm btn-success w-50" id="inv-btn-save">Save</button>
          <button class="btn btn-sm btn-secondary w-50" id="inv-btn-cancel">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Filter -->
  <div class="d-flex gap-2 mb-2">
    <select id="inv-filter-status" class="form-select form-select-sm" style="max-width:160px">
      <option value="">All Statuses</option>
      <option value="active">active</option>
      <option value="inactive">inactive</option>
      <option value="archived">archived</option>
    </select>
    <button class="btn btn-sm btn-outline-secondary" id="inv-btn-refresh">Refresh</button>
  </div>

  <!-- Table -->
  <div class="table-responsive">
    <table class="table table-sm table-hover">
      <thead class="table-light">
        <tr>
          <th>Item Code</th>
          <th>Quantity</th>
          <th>Status</th>
          <th>Created</th>
        </tr>
      </thead>
      <tbody id="inv-tbody"></tbody>
    </table>
  </div>
  <div id="inv-empty" class="text-muted text-center py-4 d-none">No items found.</div>
</div>
