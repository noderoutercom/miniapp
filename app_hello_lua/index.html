<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello CRUD</title>
    <link rel="stylesheet" href="/static/css/bootstrap.min.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container py-4">

      <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
          <h1 class="h4 fw-bold mb-0">Hello CRUD</h1>
          <p class="text-secondary small mb-0">domain_hello_items — create, read, update, delete</p>
        </div>
        <button class="btn btn-primary btn-sm" data-action="open-create">
          + New Item
        </button>
      </div>

      <!-- Item table -->
      <div class="card">
        <div class="card-body p-0">
          <table class="table table-hover mb-0" id="hl-table">
            <thead class="table-light">
              <tr>
                <th>Title</th>
                <th style="width:110px">Status</th>
                <th>Note</th>
                <th style="width:80px"></th>
              </tr>
            </thead>
            <tbody id="hl-tbody">
              <tr id="hl-empty-row">
                <td colspan="4" class="text-center text-secondary py-4 small">
                  No items yet. Click <strong>+ New Item</strong> to create one.
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Toast / status -->
      <div id="hl-status" class="hl-status d-none"></div>

    </div>

    <!-- Create / Edit modal -->
    <div class="modal fade" id="hl-modal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="hl-modal-title">New Item</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="hl-edit-id" />
            <div class="mb-3">
              <label class="form-label small fw-semibold">Title</label>
              <input type="text" class="form-control" id="hl-edit-title" placeholder="Item title" />
            </div>
            <div class="mb-3">
              <label class="form-label small fw-semibold">Status</label>
              <select class="form-select" id="hl-edit-status">
                <option value="open">Open</option>
                <option value="done">Done</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label small fw-semibold">Note</label>
              <textarea class="form-control" id="hl-edit-note" rows="2" placeholder="Optional note"></textarea>
            </div>
            <div id="hl-modal-error" class="text-danger small d-none"></div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-primary btn-sm" data-action="save-item">Save</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Delete confirm modal -->
    <div class="modal fade" id="hl-del-modal" tabindex="-1">
      <div class="modal-dialog modal-sm">
        <div class="modal-content">
          <div class="modal-body text-center py-4">
            <p class="mb-1">Delete <strong id="hl-del-title"></strong>?</p>
            <p class="text-secondary small mb-3">The record is soft-deleted and kept for audit trail.</p>
            <button class="btn btn-danger btn-sm me-2" data-action="confirm-delete">Delete</button>
            <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <script src="/static/js/bootstrap.bundle.min.js"></script>
    <script src="index.js"></script>
  </body>
</html>
